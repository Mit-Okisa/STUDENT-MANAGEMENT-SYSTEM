<head><title>Registration</title></head>

<section class="form-section">
  <form class="whole_form">
    <h2 id="form_title">Registration</h2>
    <div class="form-content">
      <label for="name">Name: </label>
      <input id="name" type="text" name = "name" [(ngModel)]="name" required/>
    </div>
    <div class="form-content">
      <label for="email">Email: </label>
      <input id="email" type="email" name = "email" [(ngModel)]="email" required/>
    </div>
    <div class="form-content">
      <label for="courseName">Course: </label>
      <input id="courseName" type="text" name = "courseName" [(ngModel)]="courseName"/>
    </div>
    <div class="form-content">
      <label for="id">Admission Number: </label>
      <input id="id" type="text" name="id" [(ngModel)] = "id"/>
    </div>
    <div class="form-content">
      <label for ="yearOfStudy">Year of Study: </label>
      <input id="yearOfStudy" name="yearOfStudy" [(ngModel)] = "yearOfStudy">
    </div>
    <div class="form-content">
      <label for ="password">Password: </label>
      <input id="password" name="password" [(ngModel)] = "password">
    </div>
    <div class="form-content">
      <button type="submit" (click)="this.addStudent()" >Submit</button>
    </div>
  </form>
</section>
