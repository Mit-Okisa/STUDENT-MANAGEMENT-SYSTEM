<head><title>Registered Students</title></head>
    <div class="registered">
      <div class="table-section">
        <h3>REGISTERED STUDENTS</h3>
        <table>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Admission Number</th>
            <th>Year of Study</th>
          </tr>
          @for (student of allStudents(); track student){
            <tr>
              <td>{{student.name}}</td>
              <td>{{student.email}}</td>
              <td>{{student.courseName}}</td>
              <td>{{student.id}}</td>
              <td>{{student.yearOfStudy}}</td>
              <td><button type="button" (click)="deleteStudent(student.id)">-</button></td>
            </tr>
          } @empty {
            <div class="emptyList">
              <p>Sorry, there are no students registered yet!</p>
            </div>
          }
        </table>
        <div>
        </div>
        <div>
          <label for = "stdAdmission">Enter the admission number: </label>
          <input type="text" id="stdName" #admnNumber/>
          <button type="button" (click)="transitionStudent(admnNumber.value)">Submit</button>
        </div>
      </div>
    </div>
